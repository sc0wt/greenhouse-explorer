<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenhouse Explorer</title>
  <link rel="stylesheet" href="greenhouse.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TICKER TAPE -->
  <div class="ticker-wrap">
    <div class="ticker-track">
      <div class="ticker-segment" id="ticker-content"></div>
      <div class="ticker-segment" id="ticker-clone"></div>
    </div>
  </div>

  <!-- MOBILE: hamburger toggle for filters -->
  <button class="hamburger" id="hamburger" onclick="toggleMobileFilters()">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-badge" id="hamburger-badge"></span>
  </button>

  <!-- MOBILE: overlay backdrop -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileFilters()"></div>

  <!-- MAIN LAYOUT: sidebar + content -->
  <div class="layout">

    <!-- LEFT SIDEBAR: filters -->
    <aside class="sidebar" id="sidebar">
      <!-- <div class="sidebar-header">/ Filter</div> -->

      <div class="filter-group">
        <div class="filter-group-label">Type</div>
        <div class="filter-group-buttons" id="filter-row-type"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Category</div>
        <div class="filter-group-buttons" id="filter-row-category"></div>
      </div>

      <!-- Result count + unit phrase, pushed to bottom -->
      <div class="sidebar-footer" id="sidebar-footer">
        <span class="filter-count" id="filter-count"></span>
      </div>
    </aside>

    <!-- RIGHT CONTENT: job cards -->
    <main class="content">
      <div id="output">Loading...</div>
    </main>

  </div>

  <!-- MOBILE: scroll to top -->
  <button class="scroll-top" id="scroll-top" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">↑</button>

  <script src="greenhouse.js"></script>

</body>
</html>
