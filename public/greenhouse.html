<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenhouse Explorer</title>
  <link rel="stylesheet" href="greenhouse.css">
</head>
<body>

  <!-- TICKER TAPE -->
  <div class="ticker-wrap">
    <div class="ticker-track">
      <div class="ticker-segment" id="ticker-content"></div>
      <div class="ticker-segment" id="ticker-clone"></div>

  </div>

  <h1>JOB BOARD</h1>

  </div>

  <div id="output">Loading...</div>

  <script src="greenhouse.js"></script>

</body>
</html>
